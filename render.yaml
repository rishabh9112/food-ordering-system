services:
  # 1. Backend Web Service (Docker container)
  - type: web
    name: food-ordering-system-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon
    plan: free
    envVars:
      - key: DB_URL
        sync: false # Set to your PostgreSQL connection URL (e.g. Neon)
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true # Auto-generates a secure random token
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PORT
        value: 8080

  # 2. Frontend Static Site (React Single Page Application)
  # NOTE: rootDir is set to 'frontend', so ALL paths below are relative to 'frontend/'
  - type: web
    name: food-ordering-system-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build           # relative to rootDir (frontend/build)
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: food-ordering-system-backend
          property: host
      - key: GENERATE_SOURCEMAP
        value: false                   # speeds up build, saves memory on free plan
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
