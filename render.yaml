services:
  # 1. Backend Web Service (Docker container)
  - type: web
    name: food-ordering-system-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon
    plan: free
    envVars:
      - key: DB_URL
        sync: false # Set to your PostgreSQL connection URL (e.g. Neon)
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true # Auto-generates a secure random token
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PORT
        value: 8080

  # 2. Frontend Static Site (React Single Page Application)
  - type: web
    name: food-ordering-system-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://food-ordering-system-backend-2bd0.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
