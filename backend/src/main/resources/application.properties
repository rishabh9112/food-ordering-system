spring.application.name=backend

# ─── DataSource ───────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:FoodOrderDefaultSecretKeyForDevelopmentOnly2024XyZ@#$ChangeInProduction}
app.jwt.expiration=86400000

# ─── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── OpenAPI / Swagger ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ─── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://*.vercel.app,https://*.onrender.com}

# ─── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
